model: unet
input_size: 512
epochs: 80
batch_size: 2
learning_rate: 1e-4
weight_decay: 1e-5
seed: 42
threshold: 0.5
loss_bce_weight: 0.5
loss_dice_weight: 0.5
train_image_dir: data/DRIVE/training/images
train_vessel_mask_dir: data/DRIVE/training/1st_manual
train_fov_mask_dir: data/DRIVE/training/mask
test_image_dir: data/DRIVE/test/images
test_vessel_mask_dir: null
test_fov_mask_dir: data/DRIVE/test/mask
val_ratio: 0.2
output_dir: outputs/unet_drive
